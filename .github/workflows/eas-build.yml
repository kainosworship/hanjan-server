name: EAS Android Build
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        default: 'production'
jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        working-directory: hanjan-app
        run: pnpm install --ignore-workspace
      - name: Remove all workspace configs
        run: |
          rm -f pnpm-workspace.yaml
          rm -f hanjan-app/pnpm-workspace.yaml
      - name: Debug structure
        working-directory: hanjan-app
        run: |
          echo "=== pwd ===" && pwd
          echo "=== parent files ===" && ls ..
          echo "=== app.json projectId ===" && node -e "const a=JSON.parse(require('fs').readFileSync('app.json','utf8')); console.log(a.expo.extra?.eas?.projectId, a.expo.slug);"
      - name: Build Android
        working-directory: hanjan-app
        run: npx eas-cli@latest build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"
