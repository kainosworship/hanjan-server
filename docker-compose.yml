version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hanjan-db
    environment:
      POSTGRES_DB: hanjan
      POSTGRES_USER: hanjan_user
      POSTGRES_PASSWORD: hanjan_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hanjan-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
